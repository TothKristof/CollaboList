scalar Date

type User {
  id: Int!
  email: String
  username: String
}

type List {
  id: Int!
  name: String!
  category: Category!
  items: [Item!]!
}

type Item {
  id: Int!
  name: String!
  price: Int!
  category: Category!
  link: String!
  addDate: Date!
  lastUpdatedDate: Date!
  list: List
}

enum Category {
  Gaming
  Technology
  Personal
  HomeLiving
  Learning
  Style
  Wellness
  Hobbies
}

enum ListRole {
  OWNER
  COLLABORATOR
  GUEST
}

type AuthPayload {
  token: String!
  user: User!
}

type UserDatas{
  items: [Item]
  lists: [List]
}

type ListWithItems {
  id: Int!
  name: String!
  items: [Item!]!
  totalCount: Int!
}

input ListUserInput {
  userId: Int!
  listId: Int!
  listRole: ListRole!
}

type ListUser{
  userId: Int!
  listId: Int!
  listRole: ListRole!
}

type ListMember {
  userId: Int!
  listId: Int!
  role: ListRole!
  user: User!
}

type ItemFetchData{
  price: Int!
  imgLink: String
}

input AddItemInput{
  name: String!
  price: Int!
  listId: Int!
  imgLink: String
  link: String!
}

type Query {
  me: User
  userData: UserDatas
  getListItems(id: Int!, searchText: String, skip: Int, take: Int): ListWithItems!
  searchUsers(searchText: String!): [User]
  getListMembers(listId: Int!): [ListMember]
  getItemDetailsFromUrl(url: String!): ItemFetchData
}

type Mutation{
    register(email: String!, password: String!, username: String!) : User
    login(email: String!, password: String!) : AuthPayload
    logout: Boolean
    addList(name: String!, category: Category!) : List!
    updatePrice(itemId: Int!, newPrice: Int!): Item!
    deleteItem(itemId: Int!): Item!
    updatePriceFromUrl(itemId: Int!): Item!
    updateAllPricesFromUrl(listId: Int!): [Item!]!
    addNewMemberToList(listUser: ListUserInput!): ListUser!
    addItemToList(itemInputs: AddItemInput): Item
}